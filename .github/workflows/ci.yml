name: CI

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      tag:
        description: >-
          Existing tag to (re-)release (e.g. "v0.1.0"). Empty input
          runs the normal main pipeline.
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FOUNDRY_PROFILE: default

jobs:
  # ----------------------------------------------------------------
  # Mode prelude. Every other job's `if:` reads `release_tag`.
  # Non-empty when this run is a release-only path (tag push or
  # workflow_dispatch with `tag` input). Empty otherwise — the
  # normal "ran on main" / "PR" pipeline.
  # ----------------------------------------------------------------
  resolve:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.r.outputs.release_tag }}
    steps:
      - id: r
        run: |
          set -euo pipefail
          tag=""
          case "${{ github.event_name }}" in
            push)
              if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
                tag="${{ github.ref_name }}"
              fi
              ;;
            workflow_dispatch)
              tag='${{ inputs.tag }}'
              ;;
          esac
          echo "release_tag=${tag}"
          echo "release_tag=${tag}" >> "$GITHUB_OUTPUT"

  # ----------------------------------------------------------------
  # Supply-chain enforcement. Runs on every PR + nightly cron @ 04:00 UTC.
  # Independent of the rest of the pipeline so a fresh advisory surfacing
  # nightly is visible without rerunning lint/test.
  # ----------------------------------------------------------------
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check all

  # ----------------------------------------------------------------
  # Test jobs — run on PR + push:main only. Skip on the release-only
  # path (tag push / workflow_dispatch with tag input): the
  # underlying main commit already ran them before cog cut the tag.
  # ----------------------------------------------------------------
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    needs: [resolve]
    if: needs.resolve.outputs.release_tag == ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy, cargo
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-stable-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-stable-lint-

      - name: Check code formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: |
          cargo clippy --version
          cargo clippy --all-targets --all-features -- -D warnings \
            -D clippy::dbg_macro \
            -D clippy::print_stdout \
            -D clippy::print_stderr \
            -D clippy::todo \
            -D clippy::unimplemented \
            -A clippy::module_name_repetitions \
            -A clippy::must_use_candidate \
            -A clippy::missing_errors_doc \
            -A clippy::missing_panics_doc

      - name: Check documentation builds
        run: cargo doc --no-deps --all-features --document-private-items

  test:
    name: Rust Tests
    runs-on: ubuntu-latest
    needs: [resolve, lint]
    if: needs.resolve.outputs.release_tag == ''
    strategy:
      matrix:
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy, cargo
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust }}-

      - name: Run tests (default features)
        run: cargo test --verbose

      - name: Run tests (all features)
        run: cargo test --verbose --all-features

      - name: Build (release)
        run: cargo build --verbose --release --all-features

  forge:
    name: Solidity Tests
    runs-on: ubuntu-latest
    needs: [resolve, lint]
    if: needs.resolve.outputs.release_tag == ''
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Show forge version
        run: forge --version
      # forge-std is referenced by solidity/PsoProtocol.t.sol but is
      # not vendored as a submodule. Mirror pso-chain's lightweight
      # clone-on-CI pattern (mise's `setup:contracts` task) so the
      # repo doesn't carry a heavy lib/ tree.
      - name: Install forge-std
        run: |
          if [ ! -d lib/forge-std ]; then
            git clone --depth 1 https://github.com/foundry-rs/forge-std.git lib/forge-std
          fi
      - name: Run forge fmt check
        run: forge fmt --check solidity
      - name: Run forge build
        run: forge build --sizes
      - name: Run forge tests
        run: forge test -vvv

  cross_side:
    name: Cross-side equality (Rust ↔ Solidity)
    runs-on: ubuntu-latest
    needs: [resolve, test, forge]
    if: needs.resolve.outputs.release_tag == ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: cargo
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Run cross-side equality test
        run: cargo test --test cross_side_equality --all-features

  # ----------------------------------------------------------------
  # Version bump + tag. Runs after every check on `push: main` (PR
  # runs and tag-push runs skip). Cog inspects the conventional-
  # commit log since the last tag and creates a `chore(version):
  # vX.Y.Z` commit + matching tag if `feat/fix/breaking` commits
  # have landed.
  # ----------------------------------------------------------------
  tag:
    name: Bump version & tag
    runs-on: ubuntu-latest
    needs: [resolve, lint, test, forge, cross_side]
    # Skip when we're already in re-release mode (tag-push or
    # workflow_dispatch with a tag input): cog has nothing to do
    # and `publish`/`github-release` fire directly off
    # `resolve.outputs.release_tag`.
    if: |
      needs.resolve.outputs.release_tag == '' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !startsWith(github.event.head_commit.message, 'chore(version):') &&
      !contains(github.event.head_commit.message, '[skip ci]')
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Cocogitto bump
        uses: cocogitto/cocogitto-action@v4
        with:
          command: bump
          args: --auto
          git-user: "github-actions[bot]"
          git-user-email: "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve created tag (if any)
        id: bump
        run: |
          set -euo pipefail
          tag="$(git tag --points-at HEAD | grep '^v' | head -n1 || true)"
          echo "tag=${tag}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  # ----------------------------------------------------------------
  # Publish. Fires on (a) a fresh cog-pushed tag in the run above,
  # or (b) a manual tag push / workflow_dispatch with `tag` input.
  # The "no new bump" case (tag job runs but creates no tag) cleanly
  # short-circuits via the `tag.outputs.tag != ''` guard.
  # ----------------------------------------------------------------
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [resolve, tag]
    if: |
      always() &&
      (
        (needs.tag.result == 'success' && needs.tag.outputs.tag != '') ||
        needs.resolve.outputs.release_tag != ''
      )
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the freshly-created tag (or the manually-named
          # one) so cargo publish ships the bumped Cargo.toml the
          # `tag` job's cog ran wrote, not the pre-bump HEAD.
          ref: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: cargo

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish --verbose --token "${CARGO_REGISTRY_TOKEN}"

      # Re-create the .crate locally. `cargo publish` cleans up
      # target/package/*.crate after a successful upload; `cargo
      # package --no-verify` is fast (skips the re-build) and
      # deterministic given the same source tree, so the resulting
      # bytes match what crates.io just received.
      - name: Re-package .crate for artifact upload
        if: success()
        run: cargo package --no-verify

      # Upload the byte-identical `.crate` as a workflow artifact so
      # the `github-release` job can attach it to the GH Release
      # alongside the crates.io copy. Signing in a follow-up commit
      # will produce one sigstore signature that verifies both the
      # GH-Release-attached and crates.io copies.
      - name: Upload .crate as workflow artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: crate-tarball
          path: target/package/*.crate
          if-no-files-found: error
          retention-days: 1

  # ----------------------------------------------------------------
  # GitHub release. Attaches the byte-identical `.crate` (from the
  # `publish` job's workflow artifact) and a SHA256SUMS file
  # alongside auto-generated notes. The crates.io upload remains
  # the canonical install channel; the GH Release adds an
  # alternate-checksummed copy for downstream consumers that prefer
  # GitHub-hosted artifacts (and is the signing pipeline's anchor in
  # a follow-up commit).
  #
  # `if: always()` so a non-fatal `publish` failure (e.g. missing
  # CARGO_REGISTRY_TOKEN) does not block the release entry.
  # ----------------------------------------------------------------
  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [resolve, tag, publish]
    if: |
      always() &&
      (
        (needs.tag.result == 'success' && needs.tag.outputs.tag != '') ||
        needs.resolve.outputs.release_tag != ''
      )
    # id-token + attestations widen this job's scope so cosign keyless +
    # actions/attest-build-provenance can mint an OIDC token and write to
    # the GitHub attestation store. Workflow-level perms stay narrower.
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}

      - name: Download .crate artifact
        if: needs.publish.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: crate-tarball
          path: dist/

      - name: Generate SHA256SUMS
        if: needs.publish.result == 'success'
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 *.crate > SHA256SUMS
          echo "---"
          cat SHA256SUMS

      - name: Install cosign
        if: needs.publish.result == 'success'
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # pin-target: v3

      - name: Sign release artifacts (cosign keyless)
        if: needs.publish.result == 'success'
        run: |
          set -euo pipefail
          cd dist
          for f in *; do
            [ -f "$f" ] || continue
            case "$f" in *.sig|*.pem) continue ;; esac
            echo "Signing $f"
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
          done
          ls -la

      - name: Generate SLSA build provenance
        if: needs.publish.result == 'success'
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # pin-target: v2
        with:
          subject-path: |
            dist/*.crate
            dist/SHA256SUMS

      - name: Compose release body
        env:
          TAG: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          PUBLISH_RESULT: ${{ needs.publish.result }}
        run: |
          set -euo pipefail
          {
            echo "## Install"
            echo
            echo "    cargo add pso-protocol@${TAG#v}"
            echo
            echo "## Artifacts"
            echo
            echo "- \`pso-protocol-${TAG#v}.crate\` — byte-identical to the crates.io upload."
            echo "- \`SHA256SUMS\` — SHA-256 of the .crate."
            echo "- \`*.sig\` + \`*.pem\` — sigstore cosign keyless signature + Fulcio cert per artifact."
            echo
            echo "## Verification"
            echo
            echo "See [SECURITY.md](https://github.com/psonet/pso-protocol/blob/main/SECURITY.md) for the verify recipe."
            echo
            echo "## CI"
            echo
            echo "- crates.io publish: ${PUBLISH_RESULT}"
            echo
            echo "See \`CHANGELOG.md\` for the per-commit detail; the changelog is auto-generated by cocogitto from conventional-commit messages."
          } > RELEASE_BODY.md
          cat RELEASE_BODY.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          name: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          body_path: RELEASE_BODY.md
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist/*.crate
            dist/*.sig
            dist/*.pem
            dist/SHA256SUMS

  # ----------------------------------------------------------------
  # verify-release: post-publish smoke test. Re-downloads every asset
  # of the release we just cut and runs `cosign verify-blob` against
  # each one. Hard-fails the workflow on any bad signature.
  # ----------------------------------------------------------------
  verify-release:
    name: Verify signed release
    runs-on: ubuntu-latest
    needs: [resolve, tag, publish, github-release]
    if: |
      always() &&
      needs.github-release.result == 'success' &&
      needs.publish.result == 'success' &&
      (
        (needs.tag.result == 'success' && needs.tag.outputs.tag != '') ||
        needs.resolve.outputs.release_tag != ''
      )
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # pin-target: v3

      - name: Download release assets
        env:
          TAG: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p verify
          gh release download "$TAG" --dir verify --repo "${{ github.repository }}"
          ls -la verify/

      - name: Verify cosign signatures
        env:
          TAG: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
        run: |
          set -euo pipefail
          cd verify
          IDENTITY_RE='^https://github\.com/psonet/pso-protocol/\.github/workflows/ci\.yml@refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$'
          OIDC_ISSUER='https://token.actions.githubusercontent.com'
          failed=0
          shopt -s nullglob
          for f in *; do
            [ -f "$f" ] || continue
            case "$f" in *.sig|*.pem) continue ;; esac
            if [ ! -f "${f}.sig" ] || [ ! -f "${f}.pem" ]; then
              echo "::error::missing ${f}.sig or ${f}.pem alongside ${f}"
              failed=1
              continue
            fi
            echo "Verifying $f"
            if cosign verify-blob \
                --certificate "${f}.pem" \
                --signature "${f}.sig" \
                --certificate-identity-regexp "$IDENTITY_RE" \
                --certificate-oidc-issuer "$OIDC_ISSUER" \
                "$f"; then
              echo "  OK $f"
            else
              echo "::error::cosign verify-blob FAILED for $f"
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            echo "::error::one or more release artifacts failed signature verification"
            exit 1
          fi
          echo "All artifacts verified."
